<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhes do Imóvel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/property.css" />
  </head>
  <body class="property-shell">
    <header class="property-header">
      <div class="container property-header__content">
        <a href="./index.html" class="back-link">Voltar para Imóveis</a>

        <div class="property-header__copy">
          <span class="property-eyebrow">Detalhes do imóvel</span>
          <h1>Apresentação do Imóvel</h1>
          <p>
            Veja as imagens, localização e descrição. Entre em contato para saber mais ou agendar uma visita.
          </p>
        </div>
      </div>
    </header>

    <main class="container property-page">
      <p id="loading" class="feedback-message">Carregando imóvel...</p>
      <p id="error-message" class="feedback-message feedback-error hidden"></p>

      <section id="property-details" class="property-layout hidden">
        <div class="property-visuals">
          <div class="gallery-card">
            <img
              id="main-image"
              src="./assets/placeholder.jpg"
              alt="Imagem do imóvel"
              class="main-image"
            />

            <div id="thumbnail-list" class="thumbnail-list"></div>
          </div>
        </div>

        <aside class="property-info">
          <div class="property-info-card">
            <span class="property-eyebrow property-eyebrow--soft">
              Imóvel Selecionado
            </span>

            <h2 id="property-title"></h2>
            <p id="property-price" class="price"></p>

            <div class="property-meta">
              <p id="property-location" class="location"></p>
              <p id="property-address" class="address"></p>
            </div>

            <section class="description-box">
              <h3>Descrição</h3>
              <p id="property-description"></p>
            </section>
          </div>

          <section id="property-video-card" class="property-video-card hidden">
            <span class="property-eyebrow property-eyebrow--soft">
              Mídia Complementar
            </span>
            <h3>Vídeo do Imóvel</h3>

            <div class="property-video-frame">
              <iframe
                id="property-video-iframe"
                title="Vídeo do imóvel"
                src=""
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen
              ></iframe>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/youtube-utils.js"></script>
    <script src="./js/property.js"></script>
  </body>
</html>
