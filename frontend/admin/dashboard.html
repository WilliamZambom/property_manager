<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body>
    <main class="dashboard-page">
      <header class="dashboard-header">
        <div>
          <h1>Painel de Imóveis</h1>
          <p>Gerencie os imóveis cadastrados no sistema.</p>
        </div>

        <div class="header-actions">
          <a href="./create-property.html" class="btn btn-primary"
            >Novo imóvel</a
          >
          <button id="logout-button" class="btn btn-secondary">Sair</button>
        </div>
      </header>

      <section class="dashboard-content">
        <p id="loading-message">Carregando imóveis...</p>
        <p id="error-message" class="error-message hidden"></p>

        <div id="empty-message" class="hidden">
          <p>Nenhum imóvel cadastrado.</p>
        </div>

        <div id="properties-list" class="properties-admin-grid hidden"></div>
      </section>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
